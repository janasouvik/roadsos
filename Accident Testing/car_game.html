<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadSOS 3D Driving Game</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

canvas{
    display:block;
}

/* LOGIN */

#login{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:350px;
    background:#111827;
    padding:30px;
    border-radius:20px;
}

.box h1{
    color:#38bdf8;
    text-align:center;
}

.box input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
}

.box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* HUD */

#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:15px;
    line-height:1.8;
}

/* SPEEDOMETER */

#speedometer{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:250px;
    height:120px;
    background:black;
    border-radius:200px 200px 0 0;
    border:5px solid #444;
    overflow:hidden;
    z-index:10;
}

#needle{
    position:absolute;
    width:5px;
    height:90px;
    background:red;
    left:50%;
    bottom:0;
    transform-origin:bottom center;
    transform:translateX(-50%) rotate(-90deg);
}

#speedText{
    position:absolute;
    width:100%;
    bottom:20px;
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:bold;
}

/* CRASH */

#crash{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:100;
}

#crash h1{
    color:red;
    font-size:70px;
}

#crash button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>



<div id="login">

    <div class="box">

        <h1>RoadSOS 3D</h1>

        <input id="name" placeholder="Enter Name">
        <input id="phone" placeholder="Phone Number">
        <input id="carNo" placeholder="Car Number">

        <button onclick="startGame()">START DRIVE</button>

    </div>

</div>



<div id="hud">

    <div>User: <span id="uName"></span></div>
    <div>Phone: <span id="uPhone"></span></div>
    <div>Car: <span id="uCar"></span></div>

</div>



<div id="speedometer">

    <div id="needle"></div>
    <div id="speedText">0 km/h</div>

</div>



<div id="crash">

    <h1>ACCIDENT 🚨</h1>

    <p>SOS Sent To Admin</p>

    <button onclick="location.reload()">Restart</button>

</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';

/* =========================
   BASIC SETUP
========================= */

let scene,camera,renderer;

let playerCar;

let roadSegments=[];

let enemies=[];
let barricades=[];

let crashed=false;

let speed=0.6;
let maxSpeed=2;

const keys={};

document.addEventListener('keydown',(e)=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener('keyup',(e)=>{
    keys[e.key.toLowerCase()] = false;
});

/* =========================
   START GAME
========================= */

window.startGame=function(){

    const name=document.getElementById('name').value;
    const phone=document.getElementById('phone').value;
    const car=document.getElementById('carNo').value;

    if(!name || !phone || !car){
        alert("Fill all details");
        return;
    }

    document.getElementById('uName').innerText=name;
    document.getElementById('uPhone').innerText=phone;
    document.getElementById('uCar').innerText=car;

    document.getElementById('login').style.display='none';

    init();

    animate();

}

/* =========================
   INIT
========================= */

function init(){

    scene=new THREE.Scene();

    scene.background=new THREE.Color(0x87ceeb);

    scene.fog = new THREE.Fog(0x87ceeb,20,120);

    camera=new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    renderer=new THREE.WebGLRenderer({
        antialias:true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    document.body.appendChild(renderer.domElement);

    /* LIGHTS */

    const light=new THREE.DirectionalLight(
        0xffffff,
        1.2
    );

    light.position.set(0,20,10);

    scene.add(light);

    const ambient=new THREE.AmbientLight(
        0xffffff,
        0.5
    );

    scene.add(ambient);

    /* ROAD SEGMENTS */

    for(let i=0;i<10;i++){

        const roadGeo=
        new THREE.PlaneGeometry(14,40);

        const roadMat=
        new THREE.MeshStandardMaterial({
            color:0x222222
        });

        const road=
        new THREE.Mesh(roadGeo,roadMat);

        road.rotation.x = -Math.PI/2;

        road.position.z = -i*40;

        scene.add(road);

        roadSegments.push(road);

    }

    /* PLAYER CAR */

    playerCar=createCar(0xff0000);

    playerCar.position.set(0,0.6,5);

    scene.add(playerCar);

    /* CAMERA */

    camera.position.set(0,5,12);

    camera.lookAt(playerCar.position);

    /* OBJECTS */

    setInterval(createEnemy,1800);

    setInterval(createBarricade,3000);

}

/* =========================
   CREATE CAR
========================= */

function createCar(color){

    const group=new THREE.Group();

    // BODY

    const body=
    new THREE.Mesh(

        new THREE.BoxGeometry(2,1,4),

        new THREE.MeshStandardMaterial({
            color
        })

    );

    group.add(body);

    // TOP

    const top=
    new THREE.Mesh(

        new THREE.BoxGeometry(1.5,0.8,2),

        new THREE.MeshStandardMaterial({
            color:0xcfe8ff
        })

    );

    top.position.y=0.8;

    group.add(top);

    // WHEELS

    for(let i=-1;i<=1;i+=2){

        for(let j=-1;j<=1;j+=2){

            const wheel=
            new THREE.Mesh(

                new THREE.CylinderGeometry(
                    0.4,
                    0.4,
                    0.5,
                    16
                ),

                new THREE.MeshStandardMaterial({
                    color:0x111111
                })

            );

            wheel.rotation.z=Math.PI/2;

            wheel.position.set(i*1.1,-0.5,j*1.4);

            group.add(wheel);

        }
    }

    return group;

}

/* =========================
   CREATE ENEMY
========================= */

function createEnemy(){

    if(crashed) return;

    const enemy=createCar(0x2563eb);

    enemy.position.set(
        (Math.random()*10)-5,
        0.6,
        -150
    );

    scene.add(enemy);

    enemies.push(enemy);

}

/* =========================
   CREATE BARRICADE
========================= */

function createBarricade(){

    if(crashed) return;

    const geo=
    new THREE.BoxGeometry(3,1.5,1);

    const mat=
    new THREE.MeshStandardMaterial({
        color:0xff8800
    });

    const b=new THREE.Mesh(geo,mat);

    b.position.set(
        (Math.random()*10)-5,
        0.8,
        -150
    );

    scene.add(b);

    barricades.push(b);

}

/* =========================
   ANIMATION LOOP
========================= */

function animate(){

    requestAnimationFrame(animate);

    if(crashed){

        renderer.render(scene,camera);

        return;
    }

    /* ======================
       CONTROLS
    ====================== */

    // ACCELERATE

    if(keys['w'] || keys['arrowup']){

        speed += 0.02;

    }

    // BRAKE

    if(keys['s'] || keys['arrowdown']){

        speed -= 0.03;

    }

    speed=Math.max(0.3,Math.min(maxSpeed,speed));

    // LEFT RIGHT

    if(keys['a'] || keys['arrowleft']){

        playerCar.position.x -= 0.15;

        playerCar.rotation.z = 0.15;

    }

    else if(keys['d'] || keys['arrowright']){

        playerCar.position.x += 0.15;

        playerCar.rotation.z = -0.15;

    }

    else{

        playerCar.rotation.z *= 0.9;

    }

    // LIMIT

    playerCar.position.x=
    Math.max(
        -5.5,
        Math.min(5.5,playerCar.position.x)
    );

    /* ======================
       ROAD MOVEMENT
    ====================== */

    roadSegments.forEach(road=>{

        road.position.z += speed*2;

        if(road.position.z > 40){

            road.position.z -= 400;

        }

    });

    /* ======================
       ENEMY CARS
    ====================== */

    enemies.forEach((enemy,index)=>{

        enemy.position.z += speed*2;

        enemy.rotation.y = Math.PI;

        if(enemy.position.z > 20){

            scene.remove(enemy);

            enemies.splice(index,1);
        }

        if(checkCollision(playerCar,enemy)){

            crashGame();
        }

    });

    /* ======================
       BARRICADES
    ====================== */

    barricades.forEach((b,index)=>{

        b.position.z += speed*2;

        if(b.position.z > 20){

            scene.remove(b);

            barricades.splice(index,1);
        }

        if(checkCollision(playerCar,b)){

            crashGame();
        }

    });

    /* ======================
       CAMERA FOLLOW
    ====================== */

    camera.position.x = playerCar.position.x;

    camera.lookAt(
        playerCar.position.x,
        0,
        playerCar.position.z-20
    );

    /* ======================
       SPEEDOMETER
    ====================== */

    let kmh=Math.floor(speed*120);

    document.getElementById('speedText')
    .innerText=kmh+" km/h";

    let angle=-90+(kmh/240)*180;

    if(angle>90) angle=90;

    document.getElementById('needle')
    .style.transform=
    `translateX(-50%) rotate(${angle}deg)`;

    renderer.render(scene,camera);

}

/* =========================
   COLLISION
========================= */

function checkCollision(a,b){

    return (

        Math.abs(a.position.x-b.position.x)<2 &&

        Math.abs(a.position.z-b.position.z)<3

    );

}

/* =========================
   CRASH
========================= */

function crashGame(){

    crashed=true;

    playerCar.rotation.x = 1.5;

    playerCar.rotation.z = 1.2;

    playerCar.position.x += 3;

    console.log("🚨 SOS ALERT SENT");

    setTimeout(()=>{

        document.getElementById('crash')
        .style.display='flex';

    },1200);

}

</script>

</body>
</html>
