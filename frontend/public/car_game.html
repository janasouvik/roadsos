<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadSOS 3D Driving Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

canvas{
    display:block;
}

/* LOGIN */
#login{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.box{
    width:350px;
    background:#111827;
    padding:30px;
    border-radius:20px;
}

.box h1{
    color:#38bdf8;
    text-align:center;
}

.box input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    box-sizing: border-box;
}

.box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#0ea5e9;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* HUD */
#hud{
    position:absolute;
    top:15px;
    left:15px;
    color:white;
    z-index:10;
    background:rgba(0,0,0,0.5);
    padding:15px;
    border-radius:15px;
    line-height:1.8;
}

/* SPEEDOMETER */
#speedometer{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:250px;
    height:120px;
    background:black;
    border-radius:200px 200px 0 0;
    border:5px solid #444;
    overflow:hidden;
    z-index:10;
}

#needle{
    position:absolute;
    width:5px;
    height:90px;
    background:red;
    left:50%;
    bottom:0;
    transform-origin:bottom center;
    transform:translateX(-50%) rotate(-90deg);
}

#speedText{
    position:absolute;
    width:100%;
    bottom:20px;
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:bold;
}

/* CRASH */
#crash{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:100;
}

#crash h1{
    color:red;
    font-size:70px;
}

#crash button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h1>RoadSOS 3D</h1>
        <input id="name" placeholder="Enter Name">
        <input id="phone" placeholder="Phone Number">
        <input id="carNo" placeholder="Car Number">
        <button onclick="startGame()">START DRIVE</button>
    </div>
</div>

<!-- HUD -->
<div id="hud">
    <div>User: <span id="uName"></span></div>
    <div>Phone: <span id="uPhone"></span></div>
    <div>Car: <span id="uCar"></span></div>
</div>

<!-- SPEED -->
<div id="speedometer">
    <div id="needle"></div>
    <div id="speedText">0 km/h</div>
</div>

<!-- CRASH -->
<div id="crash">
    <h1>ACCIDENT 🚨</h1>
    <p>Auto-SOS Alert Triggered (10s delay countdown in map)</p>
    <button onclick="location.reload()">Restart Simulation</button>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';

// ========================
// REAL ROAD GPS PATHWAY (Bangalore Kanakapura Road)
// ========================
const KanakapuraRoadPath = [
  { lat: 12.8520, lng: 77.5720 }, // Thalaghattapura
  { lat: 12.8450, lng: 77.5735 },
  { lat: 12.8380, lng: 77.5750 },
  { lat: 12.8320, lng: 77.5758 },
  { lat: 12.82739, lng: 77.58999 }, // Kaggalipura Junction
  { lat: 12.8210, lng: 77.5750 },
  { lat: 12.8150, lng: 77.5745 },
  { lat: 12.8080, lng: 77.5738 },
  { lat: 12.8010, lng: 77.5730 },
  { lat: 12.7950, lng: 77.5720 },
  { lat: 12.7880, lng: 77.5710 }
];
let pathProgress = 4; // Start near Kaggalipura center (index 4)

let scene,camera,renderer;
let playerCar;
let roadSegments=[];
let enemies=[];
let barricades=[];
let crashed=false;
let speed=0.6;
let maxSpeed=2;
const keys={};

document.addEventListener('keydown',(e)=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener('keyup',(e)=>{
    keys[e.key.toLowerCase()] = false;
});

// Auto login listener from parent window
window.addEventListener('message', (event) => {
    const data = event.data;
    if (data && data.type === 'AUTO_LOGIN') {
        document.getElementById('name').value = data.name || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('carNo').value = data.carNo || 'KA-51-AB-1234';
    }
});

/* =========================
   START GAME
========================= */
window.startGame=function(){
    const name=document.getElementById('name').value;
    const phone=document.getElementById('phone').value;
    const car=document.getElementById('carNo').value;

    if(!name || !phone || !car){
        alert("Fill all details");
        return;
    }

    document.getElementById('uName').innerText=name;
    document.getElementById('uPhone').innerText=phone;
    document.getElementById('uCar').innerText=car;
    document.getElementById('login').style.display='none';

    init();
    animate();
}

/* =========================
   INIT
========================= */
function init(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a1024);
    scene.fog = new THREE.Fog(0x0a1024,20,120);

    camera=new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

    renderer=new THREE.WebGLRenderer({
        antialias:true
    });
    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
    document.body.appendChild(renderer.domElement);

    const light=new THREE.DirectionalLight(0xffffff,1.2);
    light.position.set(0,20,10);
    scene.add(light);

    const ambient=new THREE.AmbientLight(0xffffff,0.5);
    scene.add(ambient);

    /* ROAD SEGMENTS */
    for(let i=0;i<10;i++){
        const roadGeo=new THREE.PlaneGeometry(14,40);
        const roadMat=new THREE.MeshStandardMaterial({
            color:0x1b233a
        });
        const road=new THREE.Mesh(roadGeo,roadMat);
        road.rotation.x = -Math.PI/2;
        road.position.z = -i*40;
        scene.add(road);
        roadSegments.push(road);
    }

    playerCar=createCar(0xff1e2d);
    playerCar.position.set(0,0.6,5);
    scene.add(playerCar);

    camera.position.set(0,5,12);
    camera.lookAt(playerCar.position);

    setInterval(createEnemy,1800);
    setInterval(createBarricade,3000);
}

/* =========================
   CREATE CAR
========================= */
function createCar(color){
    const group=new THREE.Group();
    const body=new THREE.Mesh(
        new THREE.BoxGeometry(2,1,4),
        new THREE.MeshStandardMaterial({ color })
    );
    group.add(body);

    const top=new THREE.Mesh(
        new THREE.BoxGeometry(1.5,0.8,2),
        new THREE.MeshStandardMaterial({ color:0xcfe8ff })
    );
    top.position.y=0.8;
    group.add(top);

    for(let i=-1;i<=1;i+=2){
        for(let j=-1;j<=1;j+=2){
            const wheel=new THREE.Mesh(
                new THREE.CylinderGeometry(0.4,0.4,0.5,16),
                new THREE.MeshStandardMaterial({ color:0x111111 })
            );
            wheel.rotation.z=Math.PI/2;
            wheel.position.set(i*1.1,-0.5,j*1.4);
            group.add(wheel);
        }
    }
    return group;
}

/* =========================
   CREATE ENEMY
========================= */
function createEnemy(){
    if(crashed) return;
    const enemy=createCar(0x2563ff);
    enemy.position.set(
        (Math.random()*10)-5,
        0.6,
        -150
    );
    scene.add(enemy);
    enemies.push(enemy);
}

/* =========================
   CREATE BARRICADE
========================= */
function createBarricade(){
    if(crashed) return;
    const geo=new THREE.BoxGeometry(3,1.5,1);
    const mat=new THREE.MeshStandardMaterial({ color:0xff8800 });
    const b=new THREE.Mesh(geo,mat);
    b.position.set(
        (Math.random()*10)-5,
        0.8,
        -150
    );
    scene.add(b);
    barricades.push(b);
}

/* =========================
   ANIMATION LOOP
========================= */
function animate(){
    requestAnimationFrame(animate);
    if(crashed){
        renderer.render(scene,camera);
        return;
    }

    if(keys['w'] || keys['arrowup']){
        speed += 0.02;
    }
    if(keys['s'] || keys['arrowdown']){
        speed -= 0.03;
    }
    speed=Math.max(0.3,Math.min(maxSpeed,speed));

    if(keys['a'] || keys['arrowleft']){
        playerCar.position.x -= 0.15;
        playerCar.rotation.z = 0.15;
    }
    else if(keys['d'] || keys['arrowright']){
        playerCar.position.x += 0.15;
        playerCar.rotation.z = -0.15;
    }
    else{
        playerCar.rotation.z *= 0.9;
    }

    playerCar.position.x=Math.max(-5.5,Math.min(5.5,playerCar.position.x));

    /* ROAD SEGMENTS */
    roadSegments.forEach(road=>{
        road.position.z += speed*2;
        if(road.position.z > 40){
            road.position.z -= 400;
        }
    });

    /* TELEMETRY & GPS POSITION MAPPING */
    if (speed > 0) {
        // Speed determines progression rate along Kanakapura Road path coordinates
        pathProgress += speed * 0.0006;
        if (pathProgress >= KanakapuraRoadPath.length - 1) {
            pathProgress = 0; // Wrap around loop
        }

        const idx = Math.floor(pathProgress);
        const nextIdx = (idx + 1) % KanakapuraRoadPath.length;
        const factor = pathProgress - idx;
        const lat = KanakapuraRoadPath[idx].lat + (KanakapuraRoadPath[nextIdx].lat - KanakapuraRoadPath[idx].lat) * factor;
        const lng = KanakapuraRoadPath[idx].lng + (KanakapuraRoadPath[nextIdx].lng - KanakapuraRoadPath[idx].lng) * factor;

        window.parent.postMessage({
            type: 'CAR_DRIVING',
            lat,
            lng,
            speed: Math.floor(speed * 120)
        }, '*');
    }

    /* ENEMY CARS */
    enemies.forEach((enemy,index)=>{
        enemy.position.z += speed*2;
        enemy.rotation.y = Math.PI;
        if(enemy.position.z > 20){
            scene.remove(enemy);
            enemies.splice(index,1);
        }
        if(checkCollision(playerCar,enemy)){
            crashGame();
        }
    });

    /* BARRICADES */
    barricades.forEach((b,index)=>{
        b.position.z += speed*2;
        if(b.position.z > 20){
            scene.remove(b);
            barricades.splice(index,1);
        }
        if(checkCollision(playerCar,b)){
            crashGame();
        }
    });

    camera.position.x = playerCar.position.x;
    camera.lookAt(
        playerCar.position.x,
        0,
        playerCar.position.z-20
    );

    let kmh=Math.floor(speed*120);
    document.getElementById('speedText').innerText=kmh+" km/h";
    let angle=-90+(kmh/240)*180;
    if(angle>90) angle=90;
    document.getElementById('needle').style.transform=`translateX(-50%) rotate(${angle}deg)`;

    renderer.render(scene,camera);
}

/* =========================
   COLLISION
========================= */
function checkCollision(a,b){
    return (
        Math.abs(a.position.x-b.position.x)<2 &&
        Math.abs(a.position.z-b.position.z)<3
    );
}

/* =========================
   CRASH
========================= */
function crashGame(){
    crashed=true;
    playerCar.rotation.x = 1.5;
    playerCar.rotation.z = 1.2;
    playerCar.position.x += 3;

    // Calculate exact crash location
    const idx = Math.floor(pathProgress);
    const nextIdx = (idx + 1) % KanakapuraRoadPath.length;
    const factor = pathProgress - idx;
    const lat = KanakapuraRoadPath[idx].lat + (KanakapuraRoadPath[nextIdx].lat - KanakapuraRoadPath[idx].lat) * factor;
    const lng = KanakapuraRoadPath[idx].lng + (KanakapuraRoadPath[nextIdx].lng - KanakapuraRoadPath[idx].lng) * factor;

    const kmh = Math.floor(speed * 120);
    const forceg = (speed * 8.5).toFixed(1); // G-force estimate
    let severity = 'LOW';
    if (kmh >= 120) severity = 'CRITICAL';
    else if (kmh >= 80) severity = 'HIGH';
    else if (kmh >= 45) severity = 'MEDIUM';

    // Dispatch crash alert to parent dashboard
    window.parent.postMessage({
        type: 'CAR_ACCIDENT',
        lat,
        lng,
        speed: kmh,
        force: forceg,
        severity: severity
    }, '*');

    setTimeout(()=>{
        document.getElementById('crash').style.display='flex';
    },1200);
}
</script>
</body>
</html>
