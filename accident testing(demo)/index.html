<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highway Traffic Racer 3D – Ultimate Edition</title>
    <meta
      name="description"
      content="A fully 3D highway traffic racing game built with React Three Fiber."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <button id="game-back-btn" style="position: absolute; top: 15px; left: 15px; z-index: 999999; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: all 0.2s;" onmouseover="this.style.background='rgba(255,30,45,0.8)'; this.style.borderColor='red';" onmouseout="this.style.background='rgba(0,0,0,0.6)'; this.style.borderColor='rgba(255,255,255,0.2)';">
      &larr; Back
    </button>
    <script>
      document.getElementById('game-back-btn').addEventListener('click', function() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.close();
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
